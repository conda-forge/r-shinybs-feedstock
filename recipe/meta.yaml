{% set version = "0.64.0" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-shinybs
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/shinyBS_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/shinyBS/shinyBS_{{ version }}.tar.gz
  sha256: f23725b53a4a7bd3a7f3ccba0b395c38328f1b8ca77fff0e6931ebd91752c9d0

build:
  noarch: generic
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-htmltools
    - r-shiny >=0.11
  run:
    - r-base
    - r-htmltools
    - r-shiny >=0.11

test:
  commands:
    - $R -e "library('shinyBS')"           # [not win]
    - "\"%R%\" -e \"library('shinyBS')\""  # [win]

about:
  home: https://ebailey78.github.io/shinyBS
  license: GPL-3.0-only
  summary: Adds additional Twitter Bootstrap components to Shiny.
  license_family: GPL3
  license_file: {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
